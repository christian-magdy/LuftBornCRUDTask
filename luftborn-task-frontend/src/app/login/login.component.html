<div class="login-container">

  <div class="login-card">
    <h2>Welcome Back 👋</h2>
    <p class="subtitle">Login to your account</p>

    <form (ngSubmit)="login()">

      <div class="input-group">
        <input
          type="text"
          placeholder="Username"
          [(ngModel)]="username"
          name="username"
          required
        />
      </div>

      <div class="input-group">
        <input
          type="password"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <button type="submit">Login</button>

    </form>
  </div>

</div>
