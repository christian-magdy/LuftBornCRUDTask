<h2>Create Task</h2>

<div class="form-card">

<form (ngSubmit)="save()">

<div class="form-group">
<label>Title</label>
<input type="text" [(ngModel)]="task.title" name="title">
</div>

<div class="form-group">
<label>Description</label>
<textarea [(ngModel)]="task.description" name="description"></textarea>
</div>

<button class="btn-create" type="submit">Save</button>

</form>

</div>
